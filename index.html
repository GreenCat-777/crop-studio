<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Crop Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #111114;
  --surface2: #18181d;
  --surface3: #1f1f26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #c8f77a;
  --accent2: #8ef0b0;
  --text: #f0efe8;
  --muted: #6b6b78;
  --muted2: #9898a8;
  --radius: 10px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

body {
  min-height: 100vh;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 10% -10%, rgba(200,247,122,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(142,240,176,0.03) 0%, transparent 60%);
  overflow-x: hidden;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* Scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}

/* Header */
header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 3rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}

.logo-mark {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(200,247,122,0.08);
  border: 1px solid rgba(200,247,122,0.2);
  padding: 3px 8px;
  border-radius: 4px;
}

h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  flex: 1;
}

h1 span { color: var(--accent); }

/* Drop zone */
#dropzone {
  border: 1px dashed var(--border2);
  border-radius: var(--radius-lg);
  padding: 4rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}

#dropzone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(200,247,122,0.03) 0%, transparent 70%);
  pointer-events: none;
}

#dropzone:hover, #dropzone.drag {
  border-color: rgba(200,247,122,0.4);
  background: var(--surface2);
}

#dropzone:hover::before, #dropzone.drag::before {
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(200,247,122,0.07) 0%, transparent 70%);
}

.drop-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 1.25rem;
  border: 1px solid var(--border2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface3);
  transition: border-color 0.2s, transform 0.2s;
}

#dropzone:hover .drop-icon {
  border-color: rgba(200,247,122,0.3);
  transform: translateY(-2px);
}

.drop-icon svg { color: var(--accent); }

.drop-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.4rem;
}

.drop-sub {
  font-size: 0.8rem;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  letter-spacing: 0.03em;
}

#fi { display: none; }

/* Editor */
#editor { display: none; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.shape-group {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  padding: 3px;
  gap: 3px;
}

.shape-btn {
  padding: 5px 18px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  border: none;
  border-radius: 5px;
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
}

.shape-btn:hover { color: var(--text); background: var(--surface3); }

.shape-btn.active {
  background: var(--accent);
  color: #0a0a0b;
  font-weight: 500;
}

.sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

.size-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
}

.size-label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  letter-spacing: 0.08em;
}

.size-input {
  width: 56px;
  background: transparent;
  border: none;
  outline: none;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  text-align: center;
  padding: 2px;
}

.size-input:focus { color: var(--accent); }

/* Remove number input spinners */
.size-input::-webkit-outer-spin-button,
.size-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.size-input[type=number] { -moz-appearance: textfield; }

.link-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: background 0.15s;
  color: var(--muted2);
}
.link-btn:hover { background: var(--surface3); }
.link-btn.active { color: var(--accent); }

.tb-btn {
  padding: 5px 14px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
}
.tb-btn:hover { border-color: var(--border2); color: var(--text); }

/* Canvas wrap */
#canvas-wrap {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  background: #050506;
  cursor: crosshair;
  touch-action: none;
  user-select: none;
}

/* Checkerboard for transparency hint */
#canvas-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: linear-gradient(45deg, #111 25%, transparent 25%),
    linear-gradient(-45deg, #111 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #111 75%),
    linear-gradient(-45deg, transparent 75%, #111 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  opacity: 0.3;
  pointer-events: none;
}

#main-canvas { display: block; max-width: 100%; position: relative; }
#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

/* Info bar */
.info-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding: 0 2px;
}

.info-txt {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.crop-readout {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
}

/* Export actions */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
  align-items: center;
}

.btn-export {
  padding: 9px 24px;
  font-size: 13px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: 1px solid rgba(200,247,122,0.35);
  border-radius: 8px;
  background: rgba(200,247,122,0.1);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.btn-export::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(200,247,122,0.06);
  transform: translateX(-100%);
  transition: transform 0.2s;
}

.btn-export:hover {
  background: rgba(200,247,122,0.18);
  border-color: rgba(200,247,122,0.6);
}

.btn-export:hover::before { transform: translateX(0); }
.btn-export:active { transform: scale(0.97); }

.btn-secondary {
  padding: 9px 18px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-secondary:hover { border-color: var(--border2); color: var(--text); }

.ml-auto { margin-left: auto; }

/* Toast */
#toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid rgba(200,247,122,0.3);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
  padding: 8px 20px;
  border-radius: 8px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">
  <header>
    <span class="logo-mark">SVG</span>
    <h1>Crop <span>Studio</span></h1>
  </header>

  <div id="dropzone" onclick="document.getElementById('fi').click()">
    <div class="drop-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 8l-4-4-4 4M12 4v12"/>
      </svg>
    </div>
    <p class="drop-title">Drop image here or click to browse</p>
    <p class="drop-sub">PNG · JPG · WEBP · GIF</p>
    <input type="file" id="fi" accept="image/*">
  </div>

  <div id="editor">
    <div class="toolbar">
      <div class="shape-group">
        <button class="shape-btn active" id="btn-square" onclick="setShape('square')">SQUARE</button>
        <button class="shape-btn" id="btn-circle" onclick="setShape('circle')">CIRCLE</button>
      </div>
      <div class="sep"></div>
      <div class="size-row">
        <span class="size-label">W</span>
        <input class="size-input" id="inp-w" type="number" value="200" min="10" max="4000" onchange="onSizeChange('w')">
        <button class="link-btn active" id="link-btn" onclick="toggleLink()" title="Lock aspect ratio">⛓</button>
        <span class="size-label">H</span>
        <input class="size-input" id="inp-h" type="number" value="200" min="10" max="4000" onchange="onSizeChange('h')">
      </div>
      <div class="sep"></div>
      <button class="tb-btn" onclick="resetCrop()">RESET</button>
    </div>

    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay" style="position:absolute;top:0;left:0;pointer-events:none"></canvas>
    </div>

    <div class="info-bar">
      <span class="info-txt">drag · scroll to zoom · handles to resize</span>
      <span class="crop-readout" id="crop-readout">200 × 200</span>
    </div>

    <div class="actions">
      <button class="btn-export" onclick="exportSVG()">Export SVG</button>
      <button class="btn-export" onclick="exportPNG()">Export PNG</button>
      <button class="btn-secondary ml-auto" onclick="newImage()">New image</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const dropzone = document.getElementById('dropzone');
const editor = document.getElementById('editor');
const fi = document.getElementById('fi');
const mainCanvas = document.getElementById('main-canvas');
const ov = document.getElementById('overlay');
const ctx = mainCanvas.getContext('2d');
const octx = ov.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const readout = document.getElementById('crop-readout');

let img = null, shape = 'square', linked = true;
let displayScale = 1;
let crop = {x:0,y:0,w:200,h:200};
let drag = null;

dropzone.addEventListener('dragover', e=>{e.preventDefault();dropzone.classList.add('drag')});
dropzone.addEventListener('dragleave', ()=>dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e=>{
  e.preventDefault();dropzone.classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) loadFile(f);
});
fi.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => { img = image; initEditor(); };
  image.src = url;
}

function initEditor() {
  dropzone.style.display = 'none';
  editor.style.display = 'block';
  const maxW = Math.min(720, window.innerWidth - 48);
  displayScale = Math.min(1, maxW / img.width, 560 / img.height);
  mainCanvas.width = Math.round(img.width * displayScale);
  mainCanvas.height = Math.round(img.height * displayScale);
  ov.width = mainCanvas.width;
  ov.height = mainCanvas.height;
  ov.style.width = mainCanvas.width + 'px';
  ov.style.height = mainCanvas.height + 'px';
  const sz = Math.round(Math.min(img.width, img.height) * 0.6);
  crop = { x: Math.round((img.width-sz)/2), y: Math.round((img.height-sz)/2), w:sz, h:sz };
  document.getElementById('inp-w').value = sz;
  document.getElementById('inp-h').value = sz;
  updateReadout();
  render();
  setupEvents();
}

function updateReadout() {
  readout.textContent = Math.round(crop.w) + ' × ' + Math.round(crop.h);
}

function setShape(s) {
  shape = s;
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+s).classList.add('active');
  render();
}

function toggleLink() {
  linked = !linked;
  const btn = document.getElementById('link-btn');
  btn.classList.toggle('active', linked);
}

function onSizeChange(axis) {
  let wv = parseInt(document.getElementById('inp-w').value)||1;
  let hv = parseInt(document.getElementById('inp-h').value)||1;
  if(linked) {
    if(axis==='w') { hv=wv; document.getElementById('inp-h').value=hv; }
    else { wv=hv; document.getElementById('inp-w').value=wv; }
  }
  crop.w = Math.max(10, Math.min(wv, img.width));
  crop.h = Math.max(10, Math.min(hv, img.height));
  crop.x = Math.max(0, Math.min(crop.x, img.width-crop.w));
  crop.y = Math.max(0, Math.min(crop.y, img.height-crop.h));
  updateReadout();
  render();
}

function resetCrop() {
  const sz = Math.round(Math.min(img.width, img.height) * 0.6);
  crop = { x: Math.round((img.width-sz)/2), y: Math.round((img.height-sz)/2), w:sz, h:sz };
  document.getElementById('inp-w').value = sz;
  document.getElementById('inp-h').value = sz;
  updateReadout();
  render();
}

function render() {
  ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
  ctx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
  drawOverlay();
}

function drawOverlay() {
  octx.clearRect(0,0,ov.width,ov.height);
  const cx=crop.x*displayScale, cy=crop.y*displayScale;
  const cw=crop.w*displayScale, ch=crop.h*displayScale;

  octx.fillStyle='rgba(0,0,0,0.62)';
  octx.fillRect(0,0,ov.width,ov.height);
  octx.save();
  octx.globalCompositeOperation='destination-out';
  if(shape==='circle'){
    octx.beginPath();
    octx.ellipse(cx+cw/2,cy+ch/2,cw/2,ch/2,0,0,Math.PI*2);
    octx.fill();
  } else { octx.fillRect(cx,cy,cw,ch); }
  octx.restore();

  // accent border
  const grad = octx.createLinearGradient(cx,cy,cx+cw,cy+ch);
  grad.addColorStop(0,'rgba(200,247,122,0.7)');
  grad.addColorStop(1,'rgba(142,240,176,0.5)');
  octx.strokeStyle = grad;
  octx.lineWidth = 1.5;
  if(shape==='circle'){
    octx.beginPath();
    octx.ellipse(cx+cw/2,cy+ch/2,cw/2,ch/2,0,0,Math.PI*2);
    octx.stroke();
  } else { octx.strokeRect(cx+0.75,cy+0.75,cw-1.5,ch-1.5); }

  // rule-of-thirds grid
  octx.strokeStyle='rgba(200,247,122,0.12)';
  octx.lineWidth=0.75;
  for(let i=1;i<3;i++){
    octx.beginPath();octx.moveTo(cx+cw*i/3,cy);octx.lineTo(cx+cw*i/3,cy+ch);octx.stroke();
    octx.beginPath();octx.moveTo(cx,cy+ch*i/3);octx.lineTo(cx+cw,cy+ch*i/3);octx.stroke();
  }

  // corner accent lines
  const cs = Math.min(cw,ch) * 0.12;
  octx.strokeStyle='rgba(200,247,122,0.9)';
  octx.lineWidth=2;
  const corners=[
    [cx,cy,[1,0],[0,1]],[cx+cw,cy,[-1,0],[0,1]],
    [cx,cy+ch,[1,0],[0,-1]],[cx+cw,cy+ch,[-1,0],[0,-1]]
  ];
  corners.forEach(([x,y,d1,d2])=>{
    octx.beginPath();octx.moveTo(x+d1[0]*cs,y);octx.lineTo(x,y);octx.lineTo(x,y+d2[1]*cs);octx.stroke();
  });

  // handles
  getHandles(cx,cy,cw,ch).forEach(h=>{
    octx.fillStyle='#0a0a0b';
    octx.strokeStyle='rgba(200,247,122,0.8)';
    octx.lineWidth=1.5;
    octx.beginPath();octx.arc(h.x,h.y,4.5,0,Math.PI*2);
    octx.fill();octx.stroke();
  });
}

function getHandles(cx,cy,cw,ch){
  return [
    {x:cx,y:cy,cursor:'nw-resize',type:'nw'},
    {x:cx+cw/2,y:cy,cursor:'n-resize',type:'n'},
    {x:cx+cw,y:cy,cursor:'ne-resize',type:'ne'},
    {x:cx+cw,y:cy+ch/2,cursor:'e-resize',type:'e'},
    {x:cx+cw,y:cy+ch,cursor:'se-resize',type:'se'},
    {x:cx+cw/2,y:cy+ch,cursor:'s-resize',type:'s'},
    {x:cx,y:cy+ch,cursor:'sw-resize',type:'sw'},
    {x:cx,y:cy+ch/2,cursor:'w-resize',type:'w'},
  ];
}

function hitHandle(px,py){
  const cx=crop.x*displayScale,cy=crop.y*displayScale,cw=crop.w*displayScale,ch=crop.h*displayScale;
  for(const h of getHandles(cx,cy,cw,ch)){
    if(Math.hypot(px-h.x,py-h.y)<9) return h;
  }
  return null;
}

function inCrop(px,py){
  const cx=crop.x*displayScale,cy=crop.y*displayScale,cw=crop.w*displayScale,ch=crop.h*displayScale;
  return px>=cx&&px<=cx+cw&&py>=cy&&py<=cy+ch;
}

function getPos(e){
  const rect=wrap.getBoundingClientRect();
  return {
    x:(e.clientX-rect.left)*(mainCanvas.width/rect.width),
    y:(e.clientY-rect.top)*(mainCanvas.height/rect.height)
  };
}

function setupEvents(){
  wrap.onmousedown=e=>{
    const {x:px,y:py}=getPos(e);
    const h=hitHandle(px,py);
    if(h){drag={type:'handle',handle:h,startCrop:{...crop},startPx:px,startPy:py};return;}
    if(inCrop(px,py)){drag={type:'move',startCrop:{...crop},startPx:px,startPy:py};wrap.style.cursor='grabbing';return;}
    drag={type:'new',startPx:px,startPy:py};
  };

  wrap.onmousemove=e=>{
    if(!drag){
      const {x:px,y:py}=getPos(e);
      const h=hitHandle(px,py);
      wrap.style.cursor=h?h.cursor:inCrop(px,py)?'grab':'crosshair';
      return;
    }
    const {x:px,y:py}=getPos(e);
    const dx=(px-drag.startPx)/displayScale;
    const dy=(py-drag.startPy)/displayScale;
    if(drag.type==='move'){
      crop.x=Math.max(0,Math.min(img.width-crop.w,drag.startCrop.x+dx));
      crop.y=Math.max(0,Math.min(img.height-crop.h,drag.startCrop.y+dy));
    } else if(drag.type==='new'){
      let iw=Math.abs(dx),ih=Math.abs(dy);
      if(linked) ih=iw=Math.min(iw,ih);
      crop.x=Math.max(0,Math.min(px<drag.startPx?px/displayScale:drag.startPx/displayScale,img.width-1));
      crop.y=Math.max(0,Math.min(py<drag.startPy?py/displayScale:drag.startPy/displayScale,img.height-1));
      crop.w=Math.max(10,Math.min(iw,img.width-crop.x));
      crop.h=Math.max(10,Math.min(ih,img.height-crop.y));
      document.getElementById('inp-w').value=Math.round(crop.w);
      document.getElementById('inp-h').value=Math.round(crop.h);
    } else if(drag.type==='handle'){
      const sc=drag.startCrop;
      let nx=sc.x,ny=sc.y,nw=sc.w,nh=sc.h;
      const t=drag.handle.type;
      if(t.includes('e')) nw=Math.max(10,sc.w+dx);
      if(t.includes('s')) nh=Math.max(10,sc.h+dy);
      if(t.includes('w')){nx=sc.x+dx;nw=Math.max(10,sc.w-dx);}
      if(t.includes('n')){ny=sc.y+dy;nh=Math.max(10,sc.h-dy);}
      if(linked&&(t==='nw'||t==='ne'||t==='se'||t==='sw')){
        const s=Math.max(nw,nh);
        if(t==='nw'){nx=sc.x+sc.w-s;ny=sc.y+sc.h-s;nw=s;nh=s;}
        else if(t==='ne'){ny=sc.y+sc.h-s;nw=s;nh=s;}
        else if(t==='sw'){nx=sc.x+sc.w-s;nw=s;nh=s;}
        else{nw=s;nh=s;}
      }
      nx=Math.max(0,nx);ny=Math.max(0,ny);
      nw=Math.min(nw,img.width-nx);nh=Math.min(nh,img.height-ny);
      crop={x:nx,y:ny,w:nw,h:nh};
      document.getElementById('inp-w').value=Math.round(nw);
      document.getElementById('inp-h').value=Math.round(nh);
    }
    updateReadout();
    render();
  };

  wrap.onmouseup=()=>{drag=null;wrap.style.cursor='crosshair';};
  wrap.onmouseleave=()=>{drag=null;wrap.style.cursor='crosshair';};

  wrap.onwheel=e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.9:1.1;
    const nw=Math.max(10,Math.min(img.width,crop.w*delta));
    const nh=Math.max(10,Math.min(img.height,crop.h*delta));
    crop.x=Math.max(0,Math.min(img.width-nw,crop.x+(crop.w-nw)/2));
    crop.y=Math.max(0,Math.min(img.height-nh,crop.y+(crop.h-nh)/2));
    crop.w=nw;crop.h=nh;
    document.getElementById('inp-w').value=Math.round(nw);
    document.getElementById('inp-h').value=Math.round(nh);
    updateReadout();render();
  };

  let touchDrag=null;
  wrap.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const rect=wrap.getBoundingClientRect();
    const px=(t.clientX-rect.left)*(mainCanvas.width/rect.width);
    const py=(t.clientY-rect.top)*(mainCanvas.height/rect.height);
    const h=hitHandle(px,py);
    if(h) drag={type:'handle',handle:h,startCrop:{...crop},startPx:px,startPy:py};
    else if(inCrop(px,py)) drag={type:'move',startCrop:{...crop},startPx:px,startPy:py};
    else drag={type:'new',startPx:px,startPy:py};
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!drag)return;
    const t=e.touches[0];
    const fakeEvt={clientX:t.clientX,clientY:t.clientY};
    wrap.onmousemove(fakeEvt);
  },{passive:false});
  wrap.addEventListener('touchend',()=>{drag=null;},{passive:false});
}

function getCroppedCanvas(){
  const out=document.createElement('canvas');
  out.width=Math.round(crop.w);out.height=Math.round(crop.h);
  const oc=out.getContext('2d');
  if(shape==='circle'){
    oc.beginPath();
    oc.ellipse(crop.w/2,crop.h/2,crop.w/2,crop.h/2,0,0,Math.PI*2);
    oc.clip();
  }
  oc.drawImage(img,Math.round(crop.x),Math.round(crop.y),Math.round(crop.w),Math.round(crop.h),0,0,Math.round(crop.w),Math.round(crop.h));
  return out;
}

function exportSVG(){
  const w=Math.round(crop.w),h=Math.round(crop.h);
  const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
  const tc=tmp.getContext('2d');
  tc.drawImage(img,Math.round(crop.x),Math.round(crop.y),w,h,0,0,w,h);
  const dataURL=tmp.toDataURL('image/png');
  let clip='',clipRef='';
  if(shape==='circle'){
    clip=`<clipPath id="c"><ellipse cx="${w/2}" cy="${h/2}" rx="${w/2}" ry="${h/2}"/></clipPath>`;
    clipRef=` clip-path="url(#c)"`;
  }
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs>${clip}</defs><image${clipRef} width="${w}" height="${h}" xlink:href="${dataURL}"/></svg>`;
  download(new Blob([svg],{type:'image/svg+xml'}),`crop-${shape}.svg`);
  toast('SVG exported');
}

function exportPNG(){
  download(getCroppedCanvas().toDataURL('image/png').replace('image/png','image/octet-stream'),`crop-${shape}.png`,'png');
  toast('PNG exported');
}

function download(blobOrUrl, filename, type){
  const a=document.createElement('a');
  if(type==='png') { a.href=blobOrUrl; }
  else { a.href=URL.createObjectURL(blobOrUrl); }
  a.download=filename;a.click();
}

function newImage(){
  img=null;
  dropzone.style.display='block';
  editor.style.display='none';
  fi.value='';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
